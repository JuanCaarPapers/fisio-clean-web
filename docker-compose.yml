services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fisioweb
      POSTGRES_PASSWORD: fisioweb
      POSTGRES_DB: fisioweb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fisioweb -d fisioweb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fisioweb:fisioweb@db:5432/fisioweb
      JWT_SECRET: ${JWT_SECRET:-supersecret_dev_only}
      NODE_ENV: development
      PORT: 3000
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fisioweb.com}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BOOKING_URL=http://localhost:5173/book
    restart: unless-stopped

volumes:
  postgres_data:
